<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组织关系互动图</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/standalone/umd/vis-network.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/dist/vis-network.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6fa;color:#333}
.header{background:#2F5496;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:600}
.header span{font-size:12px;opacity:.8}
.toolbar{background:#fff;padding:6px 16px;border-bottom:1px solid #e0e0e0;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toolbar input[type=text]{padding:4px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;width:160px;outline:0}
.toolbar input[type=text]:focus{border-color:#2F5496}
.toolbar .dept-filter{display:flex;flex-wrap:wrap;gap:4px 10px;font-size:12px;color:#555}
.toolbar .dept-filter label{cursor:pointer;display:inline-flex;align-items:center;gap:3px}
.toolbar .dept-filter input{margin:0}
#uploadZone{border:2px dashed #2F5496;border-radius:8px;padding:40px 20px;text-align:center;margin:40px 20px;background:#fff;cursor:pointer;transition:.2s}
#uploadZone:hover{border-color:#C0392B;background:#f0f2f9}
#uploadZone.dragover{border-color:#C0392B;background:#fce9e9}
#uploadZone .icon{font-size:48px;color:#2F5496}
#uploadZone .text{font-size:16px;color:#888;margin-top:8px}
#uploadZone .sub{font-size:13px;color:#aaa;margin-top:4px}
#chartArea{display:none}
#mynetwork{width:100%;height:calc(100vh - 110px);background:#e8ecf1}
#detailPanel{position:fixed;right:-340px;top:100px;width:300px;background:#fff;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:16px;transition:right .3s;z-index:100}
#detailPanel.open{right:16px}
#detailPanel h3{font-size:16px;margin-bottom:2px}
#detailPanel .sub{color:#888;font-size:12px;margin-bottom:8px}
#detailPanel .row{display:flex;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
#detailPanel .row .lbl{width:70px;color:#888}
#detailPanel .row .val{flex:1}
#detailPanel .close{position:absolute;top:10px;right:14px;cursor:pointer;color:#999;font-size:18px}
#status{font-size:12px;color:#888;margin-left:auto;white-space:nowrap}
</style>
</head>
<body>
<div class="header">
  <h1>🏢 组织关系互动图</h1>
  <span>上传Excel → 自动生成</span>
</div>

<div id="uploadZone" onclick="document.getElementById('fileInput').click()">
  <div class="icon">📂</div>
  <div class="text">点击选择 或 拖拽Excel文件到这里</div>
  <div class="sub">支持 .xlsx · 第一行为表头：姓名,部门,岗位,汇报对象,协作部门,分组标签</div>
  <input id="fileInput" type="file" accept=".xlsx,.xls" style="display:none">
</div>

<div id="chartArea">
  <div class="toolbar">
    <input id="search" type="text" placeholder="搜索姓名...">
    <div class="dept-filter" id="deptFilters"></div>
    <span id="status"></span>
  </div>
  <div id="mynetwork"></div>
</div>

<div id="detailPanel">
  <span class="close" onclick="closeDetail()">✕</span>
  <h3 id="dName"></h3>
  <div class="sub"><span id="dDept"></span> · <span id="dTitle"></span></div>
  <div class="row"><span class="lbl">汇报对象</span><span class="val" id="dReportsTo"></span></div>
  <div class="row"><span class="lbl">协作对象</span><span class="val" id="dCollab"></span></div>
  <div class="row"><span class="lbl">分组</span><span class="val" id="dGroup"></span></div>
</div>

<script>
let network = null, allPeople = [], deptColors = {};

const COLORS = ["#C0392B","#2F5496","#548235","#BF8F00","#843C0C","#365F91","#4BACC6","#8064A2","#F79646","#1F4973","#953734","#76923C","#948A54","#4F6228","#9B59B6"];

document.getElementById('uploadZone').addEventListener('dragover',e=>{e.preventDefault();document.getElementById('uploadZone').classList.add('dragover')});
document.getElementById('uploadZone').addEventListener('dragleave',()=>document.getElementById('uploadZone').classList.remove('dragover'));
document.getElementById('uploadZone').addEventListener('drop',e=>{e.preventDefault();document.getElementById('uploadZone').classList.remove('dragover');handleFile(e.dataTransfer.files[0])});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0])});

function handleFile(f){
  if(!f.name.match(/\.xlsx?$/i))return alert('请上传 .xlsx 文件');
  if(f.size>5000000)return alert('文件太大，请压缩后重试');
  var r=new FileReader();
  r.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array',cellDates:true});
      buildGraph(wb);
    }catch(err){
      alert('读取Excel失败\n错误：'+err.message+'\n\n常见原因：\n1. 文件不是标准的.xlsx格式\n2. 文件已损坏\n3. 第一行不是表头\n\n请用WPS/Excel另存为.xlsx后重试');
    }
  };
  r.readAsArrayBuffer(f);
}

function buildGraph(wb){
  var sheet=null;
  for(var n of wb.SheetNames){
    var s=wb.Sheets[n],j=XLSX.utils.sheet_to_json(s,{defval:''});
    if(j.length){sheet={name:n,data:j};break}
  }
  if(!sheet)return alert('Excel中没有数据');

  // Show debug info
  var firstRow=sheet.data[0];
  var keys=Object.keys(firstRow);
  console.log('Detected columns:', keys.join(', '));

  allPeople=sheet.data.map(function(r){return{
    id:String(r['姓名']||r['name']||r['Name']||r['人员']||''),
    dept:String(r['部门']||r['dept']||r['Dept']||r['部门名称']||''),
    title:String(r['岗位']||r['title']||r['Title']||r['职位']||r['岗位名称']||''),
    reportsTo:String(r['汇报对象']||r['reportsTo']||r['上级']||r['直属上级']||''),
    collab:String(r['协作部门']||r['collab']||r['协作']||''),
    group:String(r['分组标签']||r['group']||r['分组']||r['标签']||'员工'),
    region:String(r['区域']||r['region']||r['Region']||r['地区']||''),
  }}).filter(function(p){return p.id});
  if(!allPeople.length)return alert('未找到人员数据');

  document.getElementById('uploadZone').style.display='none';
  document.getElementById('chartArea').style.display='block';
  document.getElementById('deptFilters').innerHTML='';

  // Assign dept colors
  var ci=0; deptColors={};
  allPeople.forEach(function(p){if(!deptColors[p.dept])deptColors[p.dept]=COLORS[ci++%COLORS.length]});

  // Build dept filter checkboxes
  var depts=Object.keys(deptColors).sort();
  var filterHtml='<label style="font-weight:600">部门:</label>';
  depts.forEach(function(d){
    var c=deptColors[d];
    filterHtml+='<label><input type="checkbox" class="dept-cb" value="'+d+'" checked> <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+c+'"></span> '+d+'</label>';
  });
  filterHtml+=' <a href="javascript:void 0" onclick="toggleAllDepts(true)" style="font-size:11px;color:#2F5496">全选</a> <a href="javascript:void 0" onclick="toggleAllDepts(false)" style="font-size:11px;color:#999">清空</a>';
  document.getElementById('deptFilters').innerHTML=filterHtml;

  // Listen to filter changes
  document.querySelectorAll('.dept-cb').forEach(function(cb){cb.addEventListener('change',renderNetwork)});

  renderNetwork();
}

function getVisiblePeople(){
  var checked={};
  document.querySelectorAll('.dept-cb:checked').forEach(function(cb){checked[cb.value]=true});
  return allPeople.filter(function(p){return checked[p.dept]});
}

function toggleAllDepts(show){
  document.querySelectorAll('.dept-cb').forEach(function(cb){cb.checked=show});
  renderNetwork();
}

function renderNetwork(){
  var people=getVisiblePeople();
  if(!people.length){document.getElementById('status').textContent='0 人（请至少选择一个部门）';return}

  var nodes=new vis.DataSet(people.map(function(p){
    var bg=deptColors[p.dept]||'#999';
    var sz=p.group==='高管'||p.group==='管理层'?20:p.group==='中层'||p.group==='部门负责人'||p.group==='区域负责人'?16:13;
    var sh=p.group==='高管'||p.group==='管理层'?'star':p.group==='中层'||p.group==='部门负责人'||p.group==='区域负责人'?'diamond':'ellipse';
    return{
      id:p.id,label:p.id,widthConstraint:50,
      color:{background:bg,border:'#333',highlight:{background:bg,border:'#FFD700'}},
      font:{color:'#fff',size:9,face:'PingFang SC, Microsoft YaHei, sans-serif',strokeWidth:2,strokeColor:'rgba(0,0,0,0.4)'},
      shape:sh,size:sz,borderWidth:1,shadow:{enabled:true,size:2},
      title:'<b>'+p.id+'</b><br>'+p.dept+' · '+p.title,
    };
  }));

  // Invisible region anchor nodes — cluster people by region
  var regionMap = {};
  people.forEach(function(p){
    if(!p.region) return;
    if(!regionMap[p.region]) regionMap[p.region] = {id:'__r_'+p.region, label:'', people:[]};
    regionMap[p.region].people.push(p.id);
  });
  Object.keys(regionMap).forEach(function(r){
    var rn = regionMap[r];
    nodes.add({id:rn.id,label:'['+r+']',shape:'box',size:1,
      color:{background:'transparent',border:'#aaa'},
      font:{color:'#888',size:8,face:'PingFang SC, Microsoft YaHei, sans-serif'},
      physics:true,fixed:false,widthConstraint:30
    });
    rn.people.forEach(function(pid){
      edges.add({from:rn.id,to:pid,color:{color:'rgba(0,0,0,0.08)'},width:0.5,dashes:true,physics:true,title:''});
    });
  });

  // Calculate hierarchy level for each person
  function calcLevel(name, memo) {
    if(memo[name] !== undefined) return memo[name];
    var p = people.find(function(x){return x.id===name});
    if(!p || !p.reportsTo) { memo[name]=0; return 0; }
    memo[name] = calcLevel(p.reportsTo, memo) + 1;
    return memo[name];
  }
  var levelMap = {};
  people.forEach(function(p){levelMap[p.id]=calcLevel(p.id,levelMap)});

  var edges=new vis.DataSet();
  // Reporting edges (red solid)
  people.forEach(function(p){
    if(p.reportsTo&&people.some(function(x){return x.id===p.reportsTo}))
      edges.add({from:p.reportsTo,to:p.id,color:{color:'#C0392B'},width:2,dashes:false,title:'汇报'});
  });
  // Collaboration edges (green dashed) — only between SAME level
  people.forEach(function(p){
    if(!p.collab) return;
    p.collab.split(/[/,，、]/).map(function(s){return s.trim()}).filter(Boolean).forEach(function(tag){
      people.filter(function(x){
        return (x.dept.indexOf(tag)>=0||x.group.indexOf(tag)>=0) && x.id!==p.id && levelMap[x.id]===levelMap[p.id];
      }).forEach(function(t){
        var k=[p.id,t.id].sort().join('|');
        if(!edges.get().some(function(e){return[e.from,e.to].sort().join('|')===k&&e.title==='协作'}))
          edges.add({from:p.id,to:t.id,color:{color:'#70AD47'},width:1,dashes:true,title:'协作'});
      });
    });
  });

  document.getElementById('status').textContent=people.length+' 人 · '+edges.length+' 条关系';

  var container=document.getElementById('mynetwork');
  if(network)network.destroy();

  // Force-directed layout: clusters by connectedness, so dept nodes stay near each other
  network=new vis.Network(container,{nodes,edges},{
    physics:{enabled:true,solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-80,centralGravity:0.01,springLength:100,springConstant:0.08,damping:0.4}},
    layout:{},
    interaction:{hover:true,tooltipDelay:80,zoomView:true,dragView:true},
    edges:{smooth:{type:'curvedCW',roundness:0.1}},
  });

  // After physics settles, switch to static
  setTimeout(function(){network.setOptions({physics:{enabled:false}});},3000);

  document.getElementById('search').oninput=function(e){
    var q=e.target.value.trim();
    if(!q){network.selectNodes([]);network.unselectAll();return}
    var m=nodes.get().filter(function(n){return n.label.indexOf(q)>=0});
    if(m.length){network.selectNodes([m[0].id]);network.focus(m[0].id,{scale:1.5,animation:{duration:300}})}
  };

  network.on('click',function(params){
    if(params.nodes.length){
      var p=people.find(function(x){return x.id===params.nodes[0]});
      if(p){
        document.getElementById('dName').textContent=p.id;
        document.getElementById('dDept').textContent=p.dept;
        document.getElementById('dTitle').textContent=p.title;
        document.getElementById('dReportsTo').textContent=p.reportsTo||'无';
        document.getElementById('dCollab').textContent=p.collab||'无';
        document.getElementById('dGroup').textContent=p.group;
        document.getElementById('detailPanel').classList.add('open');
      }
    }else closeDetail();
  });
}

function closeDetail(){document.getElementById('detailPanel').classList.remove('open')}
</script>
</body>
</html>
